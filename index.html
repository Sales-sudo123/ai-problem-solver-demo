<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Investment Portfolio</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<h1>Investment Portfolio</h1>
<p>Watch the AI learn which types of investments produce the most money.</p>

<div id="chests">
  <button class="chest-btn">Chest A</button>
  <button class="chest-btn"> Chest B</button>
  <button class="chest-btn"> Chest C</button>
  <button class="chest-btn"> Chest D</button>
</div>

<div>
  <button id="runAI">Start Simulation</button>
  <button id="stopAI">Stop</button>
  <button id="resetAI">Reset Simulation</button>
</div>

<div id="round">Round: 0</div>
<div id="output"></div>
<div id="probabilities"></div>

<canvas id="rewardChart" width="600" height="300"></canvas>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Investment Portfolio</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<h1>Investment Portfolio</h1>
<p>Watch the AI learn which stocks produce the most money with two different strategies: an exploritory algorithm or a greedy strategy algorithm.</p>
<label for="mode">Mode:</label>
<select id="mode">
  <option value="learning">Learning AI</option>
  <option value="greedy">Greedy Algorithm</option>
</select>
<div id="chests">
  <button class="chest-btn">Stock 1</button>
  <button class="chest-btn">Stock 2</button>
  <button class="chest-btn">Stock 3</button>
  <button class="chest-btn">Stock 4</button>
</div>

<div>
  <button id="runAI">Start Simulation</button>
  <button id="stopAI">Stop</button>
  <button id="resetAI">Reset Simulation</button>
</div>

<div id="round">Round: 0</div>
<div id="output"></div>
<div id="probabilities"></div>

<canvas id="rewardChart" width="600" height="300"></canvas>

<script src="script.js"></script>
</body>
</html>

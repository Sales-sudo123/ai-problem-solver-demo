<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Investment Portfolio</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<h1>Investment Portfolio Artificial Intelligence Demo By Andrew Canalia</h1>
<p>Watch the AI learn which stocks produce the most money using two different strategies: an exploratory algorithm or a greedy strategy algorithm.</p>

<!-- Mode Selector -->
<label for="mode">Mode:</label>
<select id="mode">
  <option value="learning">Learning AI</option>
  <option value="greedy">Greedy Algorithm</option>
</select>

<!-- Stock Buttons (optional for display only) -->
<div id="chests">
  <button class="chest-btn">Stock 1</button>
  <button class="chest-btn">Stock 2</button>
  <button class="chest-btn">Stock 3</button>
  <button class="chest-btn">Stock 4</button>
</div>

<!-- Simulation Controls -->
<div>
  <button id="startBtn">Start Simulation</button>
  <button id="stopBtn">Stop</button>
  <button id="resetBtn">Reset Simulation</button>
</div>

<!-- Display Text -->
<div id="roundDisplay">Round: 0</div>
<div id="rewardDisplay">Stock 1: 0 pts | Stock 2: 0 pts | Stock 3: 0 pts | Stock 4: 0 pts</div>

<!-- Chart -->
<canvas id="rewardChart" width="600" height="300"></canvas>

<!-- Script -->
<script src="script.js"></script>
</body>
</html>

</body>
</html>
